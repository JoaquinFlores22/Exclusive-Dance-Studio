<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unite - Exclusive Dance Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    .fade-in { opacity: 0; transform: translateY(20px); transition: all 0.8s ease; }
    .visible { opacity: 1; transform: translateY(0); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #C5A059; border-radius: 10px; }
    body { padding-top: 80px; }
  </style>
</head>
<body class="bg-gray-900 text-white bg-cover bg-center bg-fixed" style="background-image: url('marmol-negro.jpg');">

<header class="fixed top-0 left-0 w-full z-[100] bg-white/95 backdrop-blur-md shadow-lg">
  <nav class="max-w-7xl mx-auto flex items-center justify-between px-4 md:px-8 py-4">
    <div class="text-base md:text-xl font-bold tracking-tighter text-gray-900 uppercase flex-shrink-0">
      Exclusive <span class="text-[#C5A059]">Dance</span> Studio
    </div>
    <ul class="hidden lg:flex space-x-8 text-gray-600 font-semibold text-sm uppercase tracking-widest">
      <li><a href="index.html" class="hover:text-[#C5A059] transition">Inicio</a></li>
      <li><a href="clases.html" class="hover:text-[#C5A059] transition">Clases</a></li>
      <li><a href="staff.html" class="hover:text-[#C5A059] transition">Staff</a></li>
      <li><a href="contacto.html" class="hover:text-[#C5A059] transition">Contacto</a></li>
    </ul>
    <button id="menu-btn" class="lg:hidden text-black p-2">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>
  </nav>
  <div id="mobile-menu" class="hidden lg:hidden bg-white border-t w-full absolute top-full left-0 shadow-2xl p-6 flex flex-col space-y-5 text-center font-bold uppercase text-xs text-gray-700">
      <a href="index.html">Inicio</a>
      <a href="clases.html">Clases</a>
      <a href="staff.html">Staff</a>
      <a href="contacto.html" class="text-[#C5A059]">Contacto</a>
  </div>
</header>

<main class="relative min-h-screen pb-20">
  <section class="py-16 px-6 text-center fade-in">
    <span class="text-[#C5A059] uppercase tracking-[0.5em] text-[10px] font-bold mb-4 block">Unite a nuestra familia</span>
    <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-white drop-shadow-xl">Unite a nuestro Staff</h1>
    <p class="max-w-3xl mx-auto mt-6 text-gray-200 text-sm md:text-base font-medium">Buscamos instructores profesionales para nuestras sedes de Boedo, Almagro y Lanús.</p>
  </section>

  <section class="max-w-4xl mx-auto px-6 fade-in">
    <div class="bg-white rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.4)] p-8 md:p-12 text-black">
      <h2 class="text-2xl md:text-3xl font-bold mb-10 text-center text-gray-900">Formulario de Postulación</h2>
      
      <form id="unite-form" class="space-y-6">
        <input type="hidden" name="time" id="time_hidden">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Nombre Completo</label>
            <input type="text" name="nombre" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none transition-all" placeholder="Tu nombre artístico" required>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Instagram</label>
            <div class="relative">
              <span class="absolute left-4 top-3.5 text-gray-400">@</span>
              <input type="text" name="instagram" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 pl-10 pr-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none transition-all" placeholder="usuario" required>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Correo Electrónico</label>
            <input type="email" name="email" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" required>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Número de Teléfono</label>
            <input type="tel" name="telefono" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" placeholder="+54 9 11..." required>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Sede de interés</label>
            <select name="sede" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" required>
              <option value="">Seleccioná una sede</option>
              <option value="Boedo">Boedo</option>
              <option value="Almagro">Almagro</option>
              <option value="Lanús">Lanús</option>
            </select>
          </div>
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">Especialidad</label>
            <select name="especialidad" id="especialidad" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" required>
              <option value="">Seleccioná especialidad</option>
              <option value="Urbano">Urbano</option>
              <option value="Contemporáneo">Contemporáneo</option>
              <option value="Jazz">Jazz</option>
              <option value="Hip-Hop">Hip-Hop</option>
              <option value="Ballet">Ballet</option>
              <option value="Otra">Otra (Especificar)</option>
            </select>
          </div>
        </div>

        <div id="otra-especialidad-container" class="hidden space-y-2">
            <label class="text-sm font-bold text-[#C5A059] ml-1">¿Cuál es tu especialidad?</label>
            <input type="text" name="otra_especialidad_detalle" id="otra_especialidad_detalle" class="w-full rounded-2xl border-2 border-[#C5A059]/30 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" placeholder="Ej: Tango, Salsa...">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">¿Contás con alumnos?</label>
            <select name="tiene_alumnos" id="tiene_alumnos" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" required>
              <option value="">Seleccioná una opción</option>
              <option value="si">Sí, tengo alumnos</option>
              <option value="no">No, por ahora no</option>
            </select>
          </div>
          <div id="cantidad-alumnos-container" class="hidden space-y-2">
            <label class="text-sm font-bold text-gray-700 ml-1">¿Cuántos alumnos tenés?</label>
            <input type="number" name="cantidad_alumnos" id="cantidad_alumnos" min="2" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" placeholder="Mínimo 2">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-gray-700 ml-1">Link a tu Reel / Portfolio</label>
          <input type="url" name="reel" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" placeholder="https://..." required>
        </div>

        <div class="space-y-2">
          <label class="text-sm font-bold text-gray-700 ml-1">Experiencia y Propuesta</label>
          <textarea name="experiencia" rows="5" class="w-full rounded-2xl border-2 border-gray-100 bg-gray-50 px-4 py-3 text-gray-900 focus:border-[#C5A059] focus:outline-none" placeholder="Contanos tu trayectoria..." required></textarea>
        </div>

        <button type="submit" id="btn-submit" class="w-full bg-black text-white py-5 rounded-full font-bold uppercase tracking-widest hover:bg-[#C5A059] hover:shadow-xl transform hover:scale-[1.01] transition-all duration-300">
          Enviar Postulación
        </button>

        <p id="form-feedback" class="text-center font-bold text-sm hidden mt-4 p-4 rounded-xl"></p>
      </form>
    </div>
  </section>
</main>

<script>
  (function(){ emailjs.init("UEYboTH87Edkw5v0W"); })();

  const form = document.getElementById('unite-form');
  const btn = document.getElementById('btn-submit');
  const feedback = document.getElementById('form-feedback');
  const especialidadSelect = document.getElementById('especialidad');
  const otraEspContainer = document.getElementById('otra-especialidad-container');
  const otraEspInput = document.getElementById('otra_especialidad_detalle');
  const tieneAlumnosSelect = document.getElementById('tiene_alumnos');
  const alumnosContainer = document.getElementById('cantidad-alumnos-container');
  const alumnosInput = document.getElementById('cantidad_alumnos');

  especialidadSelect.addEventListener('change', function() {
    if (this.value === 'Otra') {
      otraEspContainer.classList.remove('hidden');
      otraEspInput.setAttribute('required', 'required');
    } else {
      otraEspContainer.classList.add('hidden');
      otraEspInput.removeAttribute('required');
      otraEspInput.value = '';
    }
  });

  tieneAlumnosSelect.addEventListener('change', function() {
    if (this.value === 'si') {
      alumnosContainer.classList.remove('hidden');
      alumnosInput.setAttribute('required', 'required');
    } else {
      alumnosContainer.classList.add('hidden');
      alumnosInput.removeAttribute('required');
      alumnosInput.value = '';
    }
  });

  form.addEventListener('submit', function(event) {
    event.preventDefault();
    btn.innerText = "ENVIANDO...";
    btn.disabled = true;

    if (tieneAlumnosSelect.value === "no") {
      setTimeout(() => { mostrarExito(); }, 1500);
    } else {
      document.getElementById('time_hidden').value = new Date().toLocaleString();
      emailjs.sendForm('service_n7f5e21', 'template_62lyfho', this)
        .then(() => { mostrarExito(); }, (err) => {
          feedback.innerText = "ERROR AL ENVIAR. REINTENTÁ.";
          feedback.className = "text-center font-bold text-sm text-red-600 bg-red-50 p-4 rounded-xl block";
          feedback.classList.remove('hidden');
          btn.disabled = false;
          btn.innerText = "REINTENTAR ENVÍO";
        });
    }
  });

  function mostrarExito() {
    feedback.innerText = "¡POSTULACIÓN ENVIADA CON ÉXITO!";
    feedback.className = "text-center font-bold text-sm text-emerald-600 bg-emerald-50 p-4 rounded-xl block";
    feedback.classList.remove('hidden');
    btn.innerText = "¡ENVIADO!";
    form.reset();
    otraEspContainer.classList.add('hidden');
    alumnosContainer.classList.add('hidden');
    setTimeout(() => {
        feedback.classList.add('hidden');
        btn.disabled = false;
        btn.innerText = "ENVIAR POSTULACIÓN";
    }, 5000);
  }

  const menuBtn = document.getElementById('menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  menuBtn.onclick = () => mobileMenu.classList.toggle('hidden');

  window.onload = () => {
    document.querySelectorAll('.fade-in').forEach(el => el.classList.add('visible'));
  };
</script>
</body>
</html>
